<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>command atlas — live terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Archivo:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/vendor/xterm.css">
<style>
:root{
  --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --sans:'Archivo',system-ui,-apple-system,sans-serif;
  --node-h:36px; --ok:#7BE3A3; --gold:#FFD36B; --warn:#FF9276;
  --deckH:42vh;
}
body[data-root="kubectl"]{
  --paper:#04070E; --panel:rgba(9,16,30,.72);
  --line:#6FA8DC; --line-dim:rgba(111,168,220,.30); --grid:rgba(111,168,220,.10);
  --ink:#E4F0FC; --ink-dim:#8FA9C4; --trace:#FFC857; --trace-glow:rgba(255,200,87,.28);
}
body[data-root="docker"]{
  --paper:#03060B; --panel:rgba(8,17,28,.72);
  --line:#4E9BE0; --line-dim:rgba(78,155,224,.30); --grid:rgba(78,155,224,.10);
  --ink:#E6F1FB; --ink-dim:#89A6BF; --trace:#FF8A4C; --trace-glow:rgba(255,138,76,.28);
}
body[data-root="linux"]{
  --paper:#070409; --panel:rgba(20,11,22,.72);
  --line:#C77DBA; --line-dim:rgba(199,125,186,.30); --grid:rgba(199,125,186,.10);
  --ink:#F4ECF4; --ink-dim:#A98FA6; --trace:#F58549; --trace-glow:rgba(245,133,73,.28);
}
body[data-root="ssh"]{
  --paper:#02090B; --panel:rgba(7,22,25,.72);
  --line:#4FC5C0; --line-dim:rgba(79,197,192,.30); --grid:rgba(79,197,192,.10);
  --ink:#E6F6F4; --ink-dim:#84ADA9; --trace:#FFB454; --trace-glow:rgba(255,180,84,.28);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);overflow:hidden;transition:background .5s}

/* ---- 3D perspective wireframe backdrop ---- */
.horizon{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.horizon .floor{
  position:absolute;left:-60%;right:-60%;bottom:-45%;height:80%;
  background-image:
    repeating-linear-gradient(0deg, var(--grid) 0 1px, transparent 1px 56px),
    repeating-linear-gradient(90deg, var(--grid) 0 1px, transparent 1px 56px);
  transform:perspective(560px) rotateX(64deg);transform-origin:top center;
  animation:floorScroll 24s linear infinite;
  mask-image:linear-gradient(to bottom, transparent 0, #000 22%, #000 100%);
  -webkit-mask-image:linear-gradient(to bottom, transparent 0, #000 22%, #000 100%);
}
.horizon .ceiling{
  position:absolute;left:-60%;right:-60%;top:-52%;height:70%;
  background-image:
    repeating-linear-gradient(0deg, var(--grid) 0 1px, transparent 1px 72px),
    repeating-linear-gradient(90deg, var(--grid) 0 1px, transparent 1px 72px);
  transform:perspective(560px) rotateX(-64deg);transform-origin:bottom center;opacity:.55;
  mask-image:linear-gradient(to top, transparent 0, #000 30%, #000 100%);
  -webkit-mask-image:linear-gradient(to top, transparent 0, #000 30%, #000 100%);
}
.horizon .glowline{
  position:absolute;left:0;right:0;bottom:33%;height:1px;
  background:linear-gradient(90deg, transparent, var(--line-dim) 20%, var(--line-dim) 80%, transparent);
  box-shadow:0 0 24px 2px var(--trace-glow);opacity:.6;
}
@keyframes floorScroll{from{background-position:0 0,0 0}to{background-position:0 56px,0 0}}
@media (prefers-reduced-motion:reduce){.horizon .floor{animation:none}}

/* ---- vertical stack: workbench over terminal deck ---- */
.stack{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;height:100dvh}
.workbench{flex:1 1 auto;min-height:0;position:relative}
.app{display:grid;height:100%;grid-template-columns:1fr minmax(340px,430px);grid-template-rows:1fr}
@media (max-width:767px){ .app{grid-template-columns:1fr;grid-template-rows:1fr auto} }

.vgutter{
  flex:0 0 8px;cursor:row-resize;position:relative;z-index:4;
  background:
    linear-gradient(180deg, transparent, var(--line-dim), transparent);
}
.vgutter::after{
  content:"";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:46px;height:3px;border-radius:2px;background:var(--line-dim);
}
.vgutter:hover::after{background:var(--trace);box-shadow:0 0 10px var(--trace-glow)}

/* ---------- MAP PANE ---------- */
.map-pane{position:relative;overflow:auto;outline:none}
.map-inner{position:relative;min-width:100%;min-height:100%}
.map-inner svg{position:absolute;inset:0;pointer-events:none}
.node{
  position:absolute;height:var(--node-h);display:flex;align-items:center;padding:0 13px;
  font-family:var(--mono);font-size:13px;font-weight:500;color:var(--ink);
  background:rgba(0,0,0,.55);border:1px solid var(--line-dim);border-radius:7px;
  cursor:pointer;white-space:nowrap;user-select:none;will-change:transform;
  transition:border-color .18s,color .18s,box-shadow .25s,opacity .22s,transform .22s cubic-bezier(.2,.9,.3,1.2);
  animation:nodeIn .3s ease both;
}
@keyframes nodeIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.node{animation:none;transition-duration:.01s}}
.node:hover{border-color:var(--line);color:#fff;transform:scale(1.03)}
.node.root{
  border:1.5px solid var(--line);color:var(--line);font-weight:600;font-size:15px;letter-spacing:.03em;
  box-shadow:0 0 0 4px color-mix(in srgb, var(--line) 10%, transparent), 0 0 22px var(--trace-glow);
}
.node.rootitem{border-color:var(--line-dim);color:var(--ink-dim);font-weight:600;letter-spacing:.02em}
.node.rootitem:hover{border-color:var(--line);color:var(--ink)}
.node.on-path{
  border-color:var(--trace);color:var(--trace);
  box-shadow:0 0 18px var(--trace-glow), inset 0 0 10px color-mix(in srgb, var(--trace) 8%, transparent);
  transform:scale(1.05);
}
.node.on-path:hover{transform:scale(1.07)}
.node.focused{outline:2px solid var(--trace);outline-offset:3px;transform:scale(1.05);box-shadow:0 0 22px var(--trace-glow)}
.node.on-path.focused{transform:scale(1.08)}
.node.dimmed{opacity:.30}
.node.leaf{border-style:dashed}
.node.leaf.on-path{border-style:solid}
.node .tag{font-size:9px;letter-spacing:.1em;margin-right:8px;color:var(--ink-dim);font-family:var(--mono);font-weight:600}
.node.on-path .tag{color:var(--trace)}
.node .diff{
  margin-left:9px;font-size:8.5px;letter-spacing:.12em;font-family:var(--sans);font-weight:700;color:var(--gold);
  border:1px solid color-mix(in srgb, var(--gold) 45%, transparent);border-radius:3px;padding:1px 4px;
}
.rootarrow{
  position:absolute;width:34px;height:24px;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--line-dim);border-radius:6px;background:rgba(0,0,0,.5);color:var(--line);
  font-size:11px;cursor:pointer;user-select:none;z-index:3;
  transition:border-color .15s,color .15s,transform .15s,box-shadow .2s;
}
.rootarrow:hover{border-color:var(--trace);color:var(--trace);transform:scale(1.12);box-shadow:0 0 12px var(--trace-glow)}
.rootarrow:focus-visible{outline:2px solid var(--trace);outline-offset:2px}

.map-legend{
  position:sticky;top:0;left:0;z-index:5;padding:12px 18px 0;pointer-events:none;
  font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--ink-dim);text-transform:uppercase;
  display:flex;flex-wrap:wrap;gap:6px 16px;align-items:center;
}
.map-legend b{color:var(--line);font-weight:500}
.map-legend .key{color:var(--trace)}

/* ---------- READOUT PANE ---------- */
.readout{
  background:var(--panel);backdrop-filter:blur(10px);border-left:1px dashed var(--line-dim);
  display:flex;flex-direction:column;overflow:hidden;transition:background .5s;
}
@media (max-width:767px){ .readout{border-left:none;border-top:1px dashed var(--line-dim)} }
.titleblock{
  border-bottom:1px solid var(--line-dim);padding:14px 20px 12px;
  display:flex;justify-content:space-between;align-items:baseline;gap:12px;flex-shrink:0;
}
.titleblock h1{font-size:13px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--line)}
.titleblock .rev{font-family:var(--mono);font-size:10px;color:var(--ink-dim);letter-spacing:.1em}
.titleblock .rev b{color:var(--trace);font-weight:600}
.readout-body{flex:1;overflow-y:auto;padding:20px}

.crumbs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.crumb{font-family:var(--mono);font-size:11px;border:1px solid var(--line-dim);border-radius:5px;padding:3px 9px;color:var(--ink-dim)}
.crumb.set{border-color:var(--trace);color:var(--trace)}

.cmdcard{border:1px solid var(--line-dim);border-radius:9px;background:rgba(0,0,0,.45);margin-bottom:18px;overflow:hidden}
.cmdcard .bar{
  display:flex;align-items:center;gap:8px;padding:8px 13px;border-bottom:1px solid var(--line-dim);
  font-family:var(--mono);font-size:10px;letter-spacing:.15em;color:var(--ink-dim);text-transform:uppercase;flex-wrap:wrap;
}
.cmdcard .bar .dot{width:7px;height:7px;border-radius:50%;background:var(--line-dim)}
.cmdcard.ready .bar .dot{background:var(--ok);box-shadow:0 0 8px var(--ok)}
.cmdcard pre{
  padding:15px 16px;font-family:var(--mono);font-size:13.5px;line-height:1.65;
  white-space:pre-wrap;word-break:break-word;color:var(--ink-dim);
}
.cmdcard.ready pre{color:var(--ok)}
.cmdcard pre .cursor{display:inline-block;width:8px;height:15px;background:var(--line-dim);vertical-align:-2px;animation:blink 1.1s steps(1) infinite}
@keyframes blink{50%{opacity:0}}
@media (prefers-reduced-motion:reduce){.cmdcard pre .cursor{animation:none}}
.barbtn{
  background:none;border:1px solid var(--line-dim);border-radius:4px;color:var(--ink-dim);
  font-family:var(--mono);font-size:10px;letter-spacing:.1em;padding:2px 8px;cursor:pointer;text-transform:uppercase;
  transition:border-color .15s,color .15s,background .15s;
}
.barbtn:hover{border-color:var(--trace);color:var(--trace)}
.barbtn.copybtn{margin-left:auto}
.barbtn.sendbtn:hover{background:color-mix(in srgb,var(--trace) 16%, transparent);color:var(--ink)}
.barbtn.sendbtn:disabled{opacity:.4;cursor:not-allowed;border-style:dashed}
.barbtn.sendbtn:disabled:hover{border-color:var(--line-dim);color:var(--ink-dim);background:none}

.otherdistro{
  border:1px dashed var(--line-dim);border-radius:8px;padding:10px 13px;margin:-8px 0 18px;
  font-family:var(--mono);font-size:12px;line-height:1.6;color:var(--ink-dim);word-break:break-word;
}
.otherdistro b{color:var(--gold);font-family:var(--sans);font-size:9.5px;letter-spacing:.15em;text-transform:uppercase;display:block;margin-bottom:4px}

.readout h2{font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--line);margin:0 0 9px}
.explain{font-size:14.5px;line-height:1.7;color:var(--ink)}
.explain + h2{margin-top:22px}
.explain em{color:var(--trace);font-style:normal;font-family:var(--mono);font-size:13px}
.explain .gold{color:var(--gold);font-family:var(--mono);font-size:13px}

.caution{
  margin-top:20px;border:1px solid var(--warn);border-radius:8px;padding:12px 14px;
  font-size:13.5px;line-height:1.6;color:var(--warn);background:rgba(255,146,118,.06);
}
.caution b{letter-spacing:.15em;font-size:10px;text-transform:uppercase;display:block;margin-bottom:5px}

.hint{margin-top:22px;font-size:12.5px;line-height:1.65;color:var(--ink-dim);border-top:1px dashed var(--line-dim);padding-top:14px}
.hint kbd{font-family:var(--mono);font-size:10.5px;border:1px solid var(--line-dim);border-bottom-width:2px;border-radius:4px;padding:1px 5px;color:var(--ink);background:rgba(0,0,0,.4)}

/* ---------- TERMINAL DECK ---------- */
.deck{flex:0 0 var(--deckH);min-height:0;display:flex;flex-direction:column;background:#05070c;border-top:1px solid var(--line-dim)}
.deck.collapsed{flex-basis:38px}
.deck.collapsed .deck-body{display:none}
.deck-head{
  flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:7px 14px;
  border-bottom:1px solid var(--line-dim);font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim);
}
.deck-title{color:var(--line);font-weight:600}
.statuspill{display:inline-flex;align-items:center;gap:6px;font-size:10px;padding:2px 9px;border:1px solid var(--line-dim);border-radius:20px}
.statuspill[data-state="live"]{color:var(--ok);border-color:color-mix(in srgb,var(--ok) 50%,transparent)}
.statuspill[data-state="live"]::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 7px var(--ok)}
.statuspill[data-state="offline"]{color:var(--warn);border-color:color-mix(in srgb,var(--warn) 50%,transparent)}
.statuspill[data-state="offline"]::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--warn)}
.statuspill[data-state="connecting"]{color:var(--gold)}
.statuspill[data-state="connecting"]::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--gold);animation:blink 1s steps(1) infinite}
.autorun{display:inline-flex;align-items:center;gap:6px;cursor:pointer;color:var(--ink-dim);text-transform:none;letter-spacing:.04em;font-size:11px}
.autorun input{accent-color:var(--trace)}
.deck-btn{
  background:none;border:1px solid var(--line-dim);border-radius:4px;color:var(--ink-dim);
  font-family:var(--mono);font-size:10px;letter-spacing:.1em;padding:3px 9px;cursor:pointer;text-transform:uppercase;
}
.deck-btn:hover{border-color:var(--trace);color:var(--trace)}
.deck-btn.spacer{margin-left:auto;border:none;pointer-events:none}

.deck-body{flex:1;min-height:0;display:grid;grid-template-columns:1fr 1fr 300px;gap:1px;background:var(--line-dim)}
@media (max-width:920px){ .deck-body{grid-template-columns:1fr 1fr} .histpane{display:none} }
@media (max-width:600px){ .deck-body{grid-template-columns:1fr;grid-auto-rows:minmax(160px,1fr);overflow-y:auto} }

.termwrap{display:flex;flex-direction:column;min-height:0;min-width:0;background:#05070c;position:relative}
.termwrap.active{box-shadow:inset 0 0 0 1px var(--trace)}
.term-head{
  flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:5px 11px;
  border-bottom:1px solid var(--line-dim);font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--ink-dim);text-transform:uppercase;
}
.term-head .tdot{width:7px;height:7px;border-radius:50%;background:var(--line-dim)}
.termwrap.active .term-head .tdot{background:var(--trace);box-shadow:0 0 7px var(--trace-glow)}
.termwrap.active .term-head{color:var(--trace)}
.term-head .tmeta{margin-left:auto;color:var(--ink-dim);text-transform:none;letter-spacing:0;font-size:10px;opacity:.8}
.term-mount{flex:1;min-height:0;padding:4px 2px 2px 8px;overflow:hidden}
.term-mount .xterm{height:100%}
.term-offline{
  position:absolute;inset:32px 0 0 0;display:flex;align-items:center;justify-content:center;text-align:center;padding:22px;
  font-family:var(--mono);font-size:12px;line-height:1.7;color:var(--ink-dim);pointer-events:none;
}
.term-offline code{color:var(--gold);background:rgba(255,211,107,.08);padding:1px 6px;border-radius:4px}
.termwrap.connected .term-offline{display:none}

.histpane{display:flex;flex-direction:column;min-height:0;background:#070a10}
.hist-head{
  flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:1px solid var(--line-dim);
  font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--line);
}
.hist-head .count{color:var(--ink-dim)}
.hist-head .clear{margin-left:auto;cursor:pointer;color:var(--ink-dim);border:1px solid var(--line-dim);border-radius:4px;padding:1px 7px}
.hist-head .clear:hover{color:var(--trace);border-color:var(--trace)}
.hist-list{flex:1;min-height:0;overflow-y:auto;padding:6px}
.hist-empty{color:var(--ink-dim);font-family:var(--mono);font-size:11px;padding:14px;opacity:.6;line-height:1.6}
.hist-item{
  display:grid;grid-template-columns:auto 1fr;gap:8px;align-items:baseline;
  padding:6px 8px;border:1px solid transparent;border-radius:6px;cursor:pointer;margin-bottom:3px;
}
.hist-item:hover{border-color:var(--line-dim);background:rgba(255,255,255,.03)}
.hist-item .badge{font-family:var(--mono);font-size:9px;font-weight:600;padding:1px 5px;border-radius:3px;letter-spacing:.05em}
.hist-item .badge.t1{color:var(--ok);border:1px solid color-mix(in srgb,var(--ok) 45%,transparent)}
.hist-item .badge.t2{color:var(--gold);border:1px solid color-mix(in srgb,var(--gold) 45%,transparent)}
.hist-item .cmd{font-family:var(--mono);font-size:11.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-item .time{font-family:var(--mono);font-size:9px;color:var(--ink-dim);grid-column:2;opacity:.6}

::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line-dim);border-radius:6px;border:2px solid var(--paper)}
</style>
</head>
<body data-root="kubectl">
<div class="horizon"><div class="ceiling"></div><div class="floor"></div><div class="glowline"></div></div>

<div class="stack">
  <div class="workbench">
    <div class="app">
      <div class="map-pane" id="mapPane" tabindex="0" aria-label="Command mind map. Arrow keys to navigate, Enter to select.">
        <div class="map-legend">
          <span><b id="legendTitle">KUBECTL ATLAS</b></span>
          <span><span class="key">▲▼</span> move · <span class="key">▶</span> open · <span class="key">◀</span> back · <span class="key">↵</span> select &amp; send · <span class="key">esc</span> fold</span>
        </div>
        <div class="map-inner" id="mapInner">
          <svg id="wires"></svg>
          <div id="nodes"></div>
        </div>
      </div>
      <div class="readout">
        <div class="titleblock">
          <h1 id="sheetTitle">Command Readout</h1>
          <span class="rev"><b id="rootLabel">KUBECTL</b> · <span id="sheetNo">SHEET 1/4</span></span>
        </div>
        <div class="readout-body" id="readoutBody"></div>
      </div>
    </div>
  </div>

  <div class="vgutter" id="vgutter" title="Drag to resize · double-click to collapse"></div>

  <div class="deck" id="deck">
    <div class="deck-head">
      <span class="deck-title">Terminal Deck</span>
      <span class="statuspill" id="statusPill" data-state="offline">offline</span>
      <span id="shellMeta" style="opacity:.7"></span>
      <label class="autorun"><input type="checkbox" id="autorun"> auto-run sent commands</label>
      <span class="deck-btn spacer"></span>
      <button class="deck-btn" id="reconnectBtn">reconnect</button>
      <button class="deck-btn" id="collapseBtn">collapse</button>
    </div>
    <div class="deck-body">
      <div class="termwrap" data-term="1" id="wrap1">
        <div class="term-head"><span class="tdot"></span>Term 1<span class="tmeta" id="meta1"></span></div>
        <div class="term-mount" id="term1"></div>
        <div class="term-offline">backend not connected.<br>start it with <code>npm start</code> and open the printed URL.</div>
      </div>
      <div class="termwrap" data-term="2" id="wrap2">
        <div class="term-head"><span class="tdot"></span>Term 2<span class="tmeta" id="meta2"></span></div>
        <div class="term-mount" id="term2"></div>
        <div class="term-offline">second live shell on this host.</div>
      </div>
      <div class="histpane">
        <div class="hist-head">History <span class="count" id="histCount">0</span><span class="clear" id="clearHist">clear</span></div>
        <div class="hist-list" id="histList"></div>
      </div>
    </div>
  </div>
</div>

<script src="/vendor/xterm.js"></script>
<script src="/vendor/addon-fit.js"></script>
<script>
/* ═══════════ DATA — five roots. cmd is a string, or {u,r} (linux). ═══════════ */

const KUBECTL = [
{ id:"get", label:"get", blurb:"Lists resources — your first look at what exists and what state it's in.",
  resources:[
  { id:"pods", label:"pods", scenarios:[
    { label:"in one namespace", cmd:"kubectl get pods -n production",
      explain:"Lists every pod in the <em>production</em> namespace with name, containers ready, status (Running, Pending, CrashLoopBackOff…), restart count, and age. The everyday health check for one environment." },
    { label:"across every namespace", cmd:"kubectl get pods -A",
      explain:"Every pod in the cluster regardless of namespace, with a namespace column added. Useful when hunting for something you can't locate." },
    { label:"with node + IP columns", cmd:"kubectl get pods -n production -o wide",
      explain:"Adds the pod IP and which node it's on. Reach for it when a problem seems tied to a specific machine." },
    { label:"only the broken ones", cmd:"kubectl get pods -A --field-selector status.phase!=Running",
      explain:"Filters to anything not Running — a quick 'what's on fire' sweep. (Crash-looping pods still count as Running, so pair with a normal listing.)" },
    { label:"matching a label", cmd:"kubectl get pods -n production -l app=web",
      explain:"Only pods labeled <em>app=web</em> — exactly the pods behind one application." },
    { label:"live, as they change", cmd:"kubectl get pods -n staging --watch",

  { id:"docker",   label:"docker",   sheet:"Cargo Manifest",  tree:DOCKER,
    intro:`<h2>Objects in this harbor</h2><div class="explain">Containers <em>web-frontend</em> · <em>api-server</em> · <em>postgres-db</em> — images <em>nginx:1.27</em> · <em>myapp:2.4.1</em> — network <em>app-net</em> — volume <em>pgdata</em>.</div>` },
  { id:"linux",    label:"linux",    sheet:"Terminal Atlas",  tree:LINUX,
    intro:`<h2>Ubuntu + RHEL in one atlas</h2><div class="explain">Branches marked <span class="gold">◆</span> diverge — <em>apt</em> vs <em>dnf</em>, <em>ufw</em> vs <em>firewalld</em>. Ubuntu shows as the primary command; the RHEL equivalent appears in a comparison block beneath it.</div>` },

    intro:`<h2>The remote-access atlas</h2><div class="explain">Branches run from opening a session outward: <em>connect</em> → <em>keygen</em> → <em>copy-id</em> → <em>config</em> → <em>tunnels</em> → <em>jump host</em> → <em>agent</em> → <em>copy files</em> → <em>harden sshd</em> → <em>troubleshoot</em>. The <span class="gold">◆</span> branch differs across distros (service <em>ssh</em> vs <em>sshd</em>). Hosts used: <em>10.0.20.50</em>, <em>bastion.corp.local</em>, <em>db-server</em>.</div>` },

/* ═══════════════════════ STATE + LAYOUT ENGINE ═══════════════════════ */
const state = { rootIdx:0, verb:null, res:null, scen:null };
const focus = { col:0, idx:0 };
let colsCache = [];

const mapPane = document.getElementById('mapPane');
const mapInner= document.getElementById('mapInner');
const nodesEl = document.getElementById('nodes');
const wiresEl = document.getElementById('wires');
const readout = document.getElementById('readoutBody');

const PADX=30, GAP_X=64, NODE_H=36, GAP_Y=12, PAD_TOP=82, PAD_BOT=60;

function root(){ return ROOTS[state.rootIdx]; }
function cmdFor(s){ return typeof s.cmd==='string' ? s.cmd : s.cmd.u; }
function cmdOther(s){ return typeof s.cmd==='string' ? null : s.cmd.r; }

function measure(text){
  const p=document.createElement('div'); p.className='node';
  p.style.visibility='hidden'; p.style.position='absolute'; p.style.animation='none';
  p.innerHTML=text; nodesEl.appendChild(p); const w=p.offsetWidth; p.remove(); return w;
}
function buildCols(){
  const cols=[];
  cols.push(ROOTS.map((r,i)=>({kind:'root', label:r.label, id:'__root'+i, rootIdx:i, selected:i===state.rootIdx})));
  cols.push(root().tree.map(v=>({kind:'verb', label:v.label, id:v.id, tag:v.tag, hasDiff:v.diff, data:v})));
  if(state.verb) cols.push(state.verb.resources.map(r=>({kind:'res', label:r.label, id:r.id, data:r})));
  if(state.res)  cols.push(state.res.scenarios.map((s,i)=>({kind:'scen', label:s.label, id:state.res.id+'-s'+i, hasDiff:(typeof s.cmd!=='string'), data:s})));
  return cols;
}
function nodeHTML(n){
  const diff=n.hasDiff?'<span class="diff">◆</span>':'';
  if(n.kind==='verb') return (n.tag?`<span class="tag">${n.tag}</span>`:'')+n.label+diff;
  if(n.kind==='res')  return `<span class="tag">▸</span>${n.label}`;
  if(n.kind==='scen') return n.label+diff;
  return n.label;
}
function layout(){
  nodesEl.innerHTML='';
  const paneH=mapPane.clientHeight;
  const cols=buildCols(); colsCache=cols;
  const colW=cols.map(col=>Math.max(...col.map(n=>measure(nodeHTML(n)))));
  const colX=[]; let x=PADX;
  for(let i=0;i<cols.length;i++){ colX.push(x); x+=colW[i]+GAP_X; }
  const totalW=x-GAP_X+PADX;
  const maxCount=Math.max(...cols.map(c=>c.length));
  const contentH=Math.max(paneH, PAD_TOP+PAD_BOT+maxCount*(NODE_H+GAP_Y));
  const positions={};
  const centerY=contentH/2;
  cols.forEach((col,ci)=>{
    if(ci===0){
      /* atlas list: the selected atlas sits dead-centre, the rest stack above/below it */
      const sel=state.rootIdx;
      col.forEach((n,i)=>{ positions[n.id]={x:colX[0], y:centerY-NODE_H/2+(i-sel)*(NODE_H+GAP_Y), w:colW[0], col:0, i}; });
      return;
    }
    const blockH=col.length*NODE_H+(col.length-1)*GAP_Y;
    let anchor=centerY;
    if(ci===2 && state.verb) anchor=positions[state.verb.id].y+NODE_H/2;
    if(ci===3 && state.res)  anchor=positions[state.res.id].y+NODE_H/2;
    let top=anchor-blockH/2;
    top=Math.max(PAD_TOP, Math.min(top, contentH-PAD_BOT-blockH));
    col.forEach((n,i)=>{ positions[n.id]={x:colX[ci], y:top+i*(NODE_H+GAP_Y), w:colW[ci], col:ci, i}; });
  });
  mapInner.style.width=totalW+'px'; mapInner.style.height=contentH+'px';
  wiresEl.setAttribute('width',totalW); wiresEl.setAttribute('height',contentH); wiresEl.innerHTML='';
  function wire(a,b,hot){
    const A=positions[a],B=positions[b]; if(!A||!B)return;
    const x1=A.x+A.nodeW, y1=A.y+NODE_H/2, x2=B.x, y2=B.y+NODE_H/2, mx=(x1+x2)/2;
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}`);
    p.setAttribute('fill','none'); p.setAttribute('stroke',hot?'var(--trace)':'var(--line-dim)');
    p.setAttribute('stroke-width',hot?1.8:1); if(!hot)p.setAttribute('stroke-dasharray','4 4');
    wiresEl.appendChild(p);
  }
  cols.flat().forEach(n=>{
    const el=document.createElement('div');
    const isSelRoot=n.kind==='root'&&n.selected;
    const isDimRoot=n.kind==='root'&&!n.selected;
    el.className='node'+(isSelRoot?' root':'')+(isDimRoot?' rootitem':'')+(n.kind==='scen'?' leaf':'');
    el.innerHTML=nodeHTML(n);
    const pos=positions[n.id];
    el.style.left=pos.x+'px'; el.style.top=pos.y+'px';
    el.dataset.col=pos.col; el.dataset.idx=pos.i;
    nodesEl.appendChild(el); pos.nodeW=el.offsetWidth; pos.el=el;
    const onPath=isSelRoot||(n.kind==='verb'&&state.verb&&n.id===state.verb.id)||(n.kind==='res'&&state.res&&n.id===state.res.id)||(n.kind==='scen'&&state.scen&&n.data===state.scen);
    if(onPath&&!isSelRoot) el.classList.add('on-path');
    if(isSelRoot&&state.verb) el.classList.add('on-path');
    const colHasPick=(n.kind==='verb'&&state.verb)||(n.kind==='res'&&state.res)||(n.kind==='scen'&&state.scen);
    if(colHasPick&&!onPath) el.classList.add('dimmed');
    if(focus.col===pos.col&&focus.idx===pos.i) el.classList.add('focused');
    el.tabIndex=-1;
    el.addEventListener('click',()=>{ focus.col=pos.col; focus.idx=pos.i; select(n); });
    el.addEventListener('mouseenter',()=>showReadoutForNode(n));                 /* preview on hover */
    el.addEventListener('mouseleave',()=>showReadoutForNode(focusNodeEl()));     /* revert to focus */
  });
  const selRootId='__root'+state.rootIdx;
  cols[1].forEach(v=>wire(selRootId,v.id, state.verb&&v.id===state.verb.id));
  if(state.verb&&cols[2]) cols[2].forEach(r=>wire(state.verb.id,r.id, state.res&&r.id===state.res.id));
  if(state.res&&cols[3])  cols[3].forEach(s=>wire(state.res.id,s.id, state.scen===s.data));
  layout.positions=positions;
}
function select(n){
  if(n.kind==='root'){ setRoot(n.rootIdx); return; }
  if(n.kind==='verb'){ state.verb=(state.verb&&state.verb.id===n.id)?null:n.data; state.res=null; state.scen=null;
    if(state.verb&&state.verb.resources.length===1) state.res=state.verb.resources[0]; }
  else if(n.kind==='res'){ state.res=(state.res&&state.res.id===n.id)?null:n.data; state.scen=null; }
  else if(n.kind==='scen'){ state.scen=(state.scen===n.data)?null:n.data; }
  layout(); renderReadout();
  requestAnimationFrame(()=>mapPane.scrollTo({left:mapInner.scrollWidth, behavior:'smooth'}));
}
function setRoot(idx){
  state.rootIdx=(idx+ROOTS.length)%ROOTS.length;
  state.verb=null; state.res=null; state.scen=null; focus.col=0; focus.idx=state.rootIdx;
  document.body.dataset.root=root().id;
  document.getElementById('rootLabel').textContent=root().label.toUpperCase();
  document.getElementById('sheetTitle').textContent=root().sheet;
  document.getElementById('sheetNo').textContent=`SHEET ${state.rootIdx+1}/${ROOTS.length}`;
  document.getElementById('legendTitle').textContent=root().label.toUpperCase()+' ATLAS';
  layout(); renderReadout(); mapPane.scrollTo({left:0, top:0});
}

/* keyboard navigation */
function focusNodeEl(){ const cols=colsCache; if(focus.col>=cols.length) focus.col=cols.length-1;
  const col=cols[focus.col]; focus.idx=Math.max(0,Math.min(focus.idx,col.length-1)); return col[focus.idx]; }
function refreshFocusVisual(){
  document.querySelectorAll('.node.focused').forEach(e=>e.classList.remove('focused'));
  const n=focusNodeEl(); const pos=layout.positions[n.id];
  if(pos&&pos.el){ pos.el.classList.add('focused'); pos.el.scrollIntoView({block:'nearest',inline:'nearest'}); }
  showReadoutForNode(n);   /* description follows the keyboard focus */
}
/* Enter/→ on a scenario: assemble it, copy to clipboard, and send to the active shell */
function fireScenario(n){
  state.scen=n.data; layout(); renderReadout();
  const cmd=cmdFor(n.data);
  if(navigator.clipboard) navigator.clipboard.writeText(cmd).catch(()=>{});
  Deck.sendActive(cmd);
}
window.addEventListener('keydown',(e)=>{
  const tag=document.activeElement&&document.activeElement.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA') return;   /* typing in a terminal or field: leave it alone */
  const cols=colsCache;
  switch(e.key){
    case 'ArrowUp': e.preventDefault();
      focus.idx=Math.max(0,focus.idx-1); refreshFocusVisual(); break;
    case 'ArrowDown': e.preventDefault();
      focus.idx=Math.min(cols[focus.col].length-1,focus.idx+1); refreshFocusVisual(); break;
    case 'ArrowRight': { e.preventDefault(); const n=focusNodeEl();
      if(n.kind==='root'){ setRoot(n.rootIdx); focus.col=1; focus.idx=0; refreshFocusVisual(); }
      else if(n.kind==='scen'){ state.scen=n.data; layout(); refreshFocusVisual(); }  /* select only — never sends */
      else { select(n);
        if(state.verb||state.res){ const nc=colsCache; if(focus.col+1<nc.length){ focus.col+=1; focus.idx=0; } }
        refreshFocusVisual(); }
      break; }
    case 'Enter': case ' ': { e.preventDefault(); const n=focusNodeEl();
      if(n.kind==='root'){ setRoot(n.rootIdx); focus.col=1; focus.idx=0; refreshFocusVisual(); }
      else if(n.kind==='scen'){ fireScenario(n); refreshFocusVisual(); }  /* Enter sends to the active shell */
      else { select(n);
        if(state.verb||state.res){ const nc=colsCache; if(focus.col+1<nc.length){ focus.col+=1; focus.idx=0; } }
        refreshFocusVisual(); }
      break; }
    case 'ArrowLeft': e.preventDefault();
      if(focus.col>0){ focus.col--;
        if(focus.col===0){ focus.idx=state.rootIdx; }
        else { const sel=focus.col===1?state.verb:focus.col===2?state.res:null;
          if(sel){ focus.idx=colsCache[focus.col].findIndex(x=>x.data===sel); if(focus.idx<0)focus.idx=0; } }
        refreshFocusVisual(); } break;
    case 'Escape': e.preventDefault();
      if(state.scen){ state.scen=null; } else if(state.res){ state.res=null; focus.col=Math.min(focus.col,2); }
      else if(state.verb){ state.verb=null; focus.col=Math.min(focus.col,1); }
      layout(); renderReadout(); refreshFocusVisual(); break;
  }
});

/* ═══════════════════════ READOUT ═══════════════════════ */
/* `view` describes what to render: the committed state by default, or a hovered/
   focused node's path for a live preview. It never mutates the actual selection. */
function ctxForNode(n){
  if(!n) return state;
  if(n.kind==='root') return {rootIdx:n.rootIdx, verb:null, res:null, scen:null};
  if(n.kind==='verb') return {rootIdx:state.rootIdx, verb:n.data, res:null, scen:null};
  if(n.kind==='res')  return {rootIdx:state.rootIdx, verb:state.verb, res:n.data, scen:null};
  if(n.kind==='scen') return {rootIdx:state.rootIdx, verb:state.verb, res:state.res, scen:n.data};
  return state;
}
function showReadoutForNode(n){ renderReadout(ctxForNode(n)); }
function renderReadout(view){
  view = view || state;
  const r=ROOTS[view.rootIdx];
  const crumbs=`<div class="crumbs">
      <span class="crumb set">${r.label}</span>
      <span class="crumb ${view.verb?'set':''}">${view.verb?view.verb.label:'branch'}</span>
      <span class="crumb ${view.res?'set':''}">${view.res?view.res.label:'target'}</span>
      <span class="crumb ${view.scen?'set':''}">scenario</span></div>`;
  let cmdHTML, ready=false, other=null;
  if(view.scen){ ready=true; cmdHTML=escapeHTML(cmdFor(view.scen)); other=cmdOther(view.scen); }
  else { const shellRoot=(r.id==='linux'||r.id==='ssh'); let partial=shellRoot?'$':r.label; if(view.verb&&!shellRoot) partial+=' '+view.verb.label.split(' / ')[0];
         cmdHTML=escapeHTML(partial)+' <span class="cursor"></span>'; }
  let body='';
  if(view.scen){
    body=`<h2>What this does</h2><div class="explain">${view.scen.explain}</div>`;
    if(view.scen.caution) body+=`<div class="caution"><b>Handle with care</b>${view.scen.caution}</div>`;
    body+=`<div class="hint"><kbd>↵</kbd> sends this straight into the <b>active</b> shell — the highlighted one below. Or <kbd>copy</kbd> it, or push to a specific one with <kbd>▶ term 1</kbd> / <kbd>▶ term 2</kbd>. Toggle <b>auto-run</b> in the deck header to choose whether sent commands execute or just stage at the prompt.</div>`;
  } else if(view.res){
    body=`<h2>Almost there</h2><div class="explain">Pick a <em>scenario</em> — each is a complete command with realistic names filled in.</div>`;
  } else if(view.verb){
    body=`<h2>About “${escapeHTML(view.verb.label)}”</h2><div class="explain">${view.verb.blurb}</div><div class="hint">Pick a <b>target</b>, then a scenario.</div>`;
  } else {
    body=r.intro+`<h2>Navigation</h2><div class="explain">The four atlases sit in a list on the left; the selected one moves to centre and fans out its branches. Hover or arrow onto any node to read it here. Keyboard: <kbd>▲</kbd><kbd>▼</kbd> move through the list or a column, <kbd>▶</kbd> opens the focused item, <kbd>◀</kbd> steps back, <kbd>↵</kbd> selects — and on a finished command, sends it into the active shell below. <kbd>esc</kbd> folds a level.</div>`;
  }
  const otherBlock=other?`<div class="otherdistro"><b>on RHEL</b>${escapeHTML(other)}</div>`:'';
  const sendBtns = ready
    ? `<button class="barbtn copybtn" id="copyBtn">copy</button>
       <button class="barbtn sendbtn" id="send1" title="Send to Term 1">▶ term 1</button>
       <button class="barbtn sendbtn" id="send2" title="Send to Term 2">▶ term 2</button>` : '';
  readout.innerHTML = crumbs + `
    <div class="cmdcard ${ready?'ready':''}">
      <div class="bar"><span class="dot"></span>${ready?'command assembled':'building command'}${sendBtns}</div>
      <pre>${cmdHTML}</pre>
    </div>` + otherBlock + body;
  if(ready){
    const cmd=cmdFor(view.scen);
    document.getElementById('copyBtn').onclick=()=>{ navigator.clipboard?.writeText(cmd).catch(()=>{
      const ta=document.createElement('textarea'); ta.value=cmd; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); });
      flashBtn('copyBtn','copied'); };
    document.getElementById('send1').onclick=()=>Deck.send(cmd,1);
    document.getElementById('send2').onclick=()=>Deck.send(cmd,2);
  }
}
function flashBtn(id,txt){ const b=document.getElementById(id); if(!b)return; const o=b.textContent; b.textContent=txt; setTimeout(()=>b.textContent=o,1300); }
function escapeHTML(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ═══════════════════════ TERMINAL DECK ═══════════════════════ */
const Deck = (function(){
  const TERM_THEME = { background:'#05070c', foreground:'#d7e4f2', cursor:'#7BE3A3',
    cursorAccent:'#05070c', selectionBackground:'rgba(255,255,255,.18)',
    black:'#1c2530', red:'#ff8a76', green:'#7BE3A3', yellow:'#FFD36B', blue:'#6FA8DC',
    magenta:'#C77DBA', cyan:'#4FC5A8', white:'#d7e4f2', brightBlack:'#5b6b7d' };
  const terms={}, fits={}; let ws=null, wsReady=false, active=1, history=[], reconnectT=null;
  const hasXterm = (typeof window.Terminal==='function' && window.FitAddon && typeof window.FitAddon.FitAddon==='function');

  function statusEl(){ return document.getElementById('statusPill'); }
  function setStatus(s){ const el=statusEl(); if(el){ el.dataset.state=s; el.textContent=s; } }

  function init(){
    if(!hasXterm){ setStatus('offline'); showManual(); return; }
    [1,2].forEach(n=>{
      const t=new window.Terminal({ fontFamily:"var(--mono)", fontFamily:"'IBM Plex Mono', monospace",
        fontSize:13, cursorBlink:true, scrollback:6000, theme:TERM_THEME, allowProposedApi:true });
      const fit=new window.FitAddon.FitAddon(); t.loadAddon(fit);
      t.open(document.getElementById('term'+n)); try{ fit.fit(); }catch{}
      t.onData(d=>wsSend({type:'input', term:n, data:d}));
      t.onResize(({cols,rows})=>wsSend({type:'resize', term:n, cols, rows}));
      document.getElementById('wrap'+n).addEventListener('mousedown',()=>setActive(n));
      terms[n]=t; fits[n]=fit;
    });
    connect();
    window.addEventListener('resize', fitAll);
    setActive(1);
  }
  function showManual(){
    /* xterm assets absent (page opened without the backend): keep offline hint visible */
    ['1','2'].forEach(n=>{ const m=document.getElementById('term'+n); if(m) m.style.opacity='.4'; });
  }
  function connect(){
    if(!hasXterm) return;
    const params=new URLSearchParams(location.search);
    const token=params.get('token');
    if(location.protocol==='file:' || !token){ setStatus('offline'); offlineBanner(); return; }
    setStatus('connecting');
    const proto=location.protocol==='https:'?'wss':'ws';
    try{ ws=new WebSocket(`${proto}://${location.host}/pty?token=${encodeURIComponent(token)}`); }
    catch(e){ setStatus('offline'); return; }
    ws.onopen=()=>{ wsReady=true; setStatus('live');
      document.getElementById('wrap1').classList.add('connected');
      document.getElementById('wrap2').classList.add('connected');
      fitAll(); [1,2].forEach(n=>wsSend({type:'resize',term:n,cols:terms[n].cols,rows:terms[n].rows})); };
    ws.onmessage=(e)=>{ let m; try{m=JSON.parse(e.data);}catch{return;}
      if(m.type==='data'&&terms[m.term]) terms[m.term].write(m.data);
      else if(m.type==='exit'&&terms[m.term]) terms[m.term].write(`\r\n\x1b[90m[process exited: ${m.code}]\x1b[0m\r\n`);
      else if(m.type==='ready'){ const sm=document.getElementById('shellMeta'); if(sm) sm.textContent=m.shell?('· '+m.shell):''; } };
    ws.onclose=()=>{ wsReady=false; setStatus('offline');
      document.getElementById('wrap1').classList.remove('connected');
      document.getElementById('wrap2').classList.remove('connected');
      scheduleReconnect(); };
    ws.onerror=()=>{ setStatus('offline'); };
  }
  function scheduleReconnect(){ clearTimeout(reconnectT); reconnectT=setTimeout(connect, 2500); }
  function wsSend(o){ if(wsReady && ws && ws.readyState===1) ws.send(JSON.stringify(o)); }
  function offlineBanner(){
    if(!hasXterm) return;
    [1,2].forEach(n=>{ terms[n].writeln('\x1b[90m— backend not connected —\x1b[0m');
      terms[n].writeln('\x1b[90mrun \x1b[33mnpm start\x1b[90m and open the printed URL to get a live shell here.\x1b[0m'); });
  }
  function fitAll(){ [1,2].forEach(n=>{ if(fits[n]){ try{ fits[n].fit(); wsSend({type:'resize',term:n,cols:terms[n].cols,rows:terms[n].rows}); }catch{} } }); }
  function setActive(n){ active=n;
    document.getElementById('wrap1').classList.toggle('active', n===1);
    document.getElementById('wrap2').classList.toggle('active', n===2); }

  function send(cmd, n){
    setActive(n);
    const autorun=document.getElementById('autorun').checked;
    if(wsReady){ wsSend({type:'input', term:n, data: autorun ? cmd+'\r' : cmd}); if(terms[n]) terms[n].focus(); }
    else { if(hasXterm && terms[n]){ terms[n].writeln(`\x1b[33m(offline — would ${autorun?'run':'stage'}:)\x1b[0m ${cmd}`);} flashStatus(); }
    pushHistory(cmd, n);
  }
  function sendActive(cmd){ send(cmd, active); }
  function flashStatus(){ const el=statusEl(); if(!el)return; el.style.transform='scale(1.15)'; setTimeout(()=>el.style.transform='',200); }

  function pushHistory(cmd, n){
    history.unshift({cmd, n, t:new Date()}); if(history.length>200) history.pop(); renderHistory();
  }
  function renderHistory(){
    const list=document.getElementById('histList'); const cnt=document.getElementById('histCount');
    cnt.textContent=history.length;
    if(!history.length){ list.innerHTML='<div class="hist-empty">Commands you send to a terminal appear here. Click one to send it again.</div>'; return; }
    list.innerHTML=history.map((h,i)=>{
      const time=h.t.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
      return `<div class="hist-item" data-i="${i}" title="Click to re-send to Term ${h.n}">
        <span class="badge t${h.n}">T${h.n}</span>
        <span class="cmd">${escapeHTML(h.cmd)}</span>
        <span class="time">${time}</span></div>`;
    }).join('');
    list.querySelectorAll('.hist-item').forEach(el=>{
      el.addEventListener('click',()=>{ const h=history[+el.dataset.i]; send(h.cmd, h.n); });
    });
  }
  function clearHistory(){ history=[]; renderHistory(); }

  return { init, send, sendActive, fitAll, connect, clearHistory,
    reconnect(){ if(ws){ try{ws.close();}catch{} } clearTimeout(reconnectT); connect(); } };
})();

/* ═══════════════════════ DECK CHROME: resize / collapse ═══════════════════════ */
(function deckChrome(){
  const stack=document.querySelector('.stack');
  const gutter=document.getElementById('vgutter');
  const deck=document.getElementById('deck');
  let dragging=false;
  function setDeckH(px){ const min=120, max=window.innerHeight-160;
    px=Math.max(min, Math.min(max, px)); stack.style.setProperty('--deckH', px+'px'); Deck.fitAll(); }
  gutter.addEventListener('pointerdown',(e)=>{ dragging=true; gutter.setPointerCapture(e.pointerId); e.preventDefault(); });
  gutter.addEventListener('pointermove',(e)=>{ if(dragging) setDeckH(window.innerHeight - e.clientY); });
  gutter.addEventListener('pointerup',(e)=>{ dragging=false; try{gutter.releasePointerCapture(e.pointerId);}catch{} });
  gutter.addEventListener('dblclick',()=>toggleCollapse());
  function toggleCollapse(){ deck.classList.toggle('collapsed');
    document.getElementById('collapseBtn').textContent=deck.classList.contains('collapsed')?'expand':'collapse';
    if(!deck.classList.contains('collapsed')) requestAnimationFrame(()=>Deck.fitAll()); }
  document.getElementById('collapseBtn').addEventListener('click', toggleCollapse);
  document.getElementById('reconnectBtn').addEventListener('click', ()=>Deck.reconnect());
  document.getElementById('clearHist').addEventListener('click', ()=>Deck.clearHistory());
})();

/* ═══════════════════════ BOOT ═══════════════════════ */
window.addEventListener('resize', ()=>layout());
layout();
renderReadout();
refreshFocusVisual();
Deck.init();
</script>
