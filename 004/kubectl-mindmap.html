<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kubectl chart — command mind map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Archivo:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#0D2740;          /* blueprint field */
  --paper-2:#10304F;        /* readout panel */
  --line:#6FA8DC;           /* schematic line */
  --line-dim:rgba(111,168,220,.38);
  --grid:rgba(111,168,220,.07);
  --ink:#E4F0FC;            /* primary text */
  --ink-dim:#9FBEDC;        /* secondary text */
  --trace:#FFC857;          /* selected circuit trace */
  --ok:#7DE8A8;             /* assembled command */
  --warn:#FF9B71;           /* caution */
  --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --sans:'Archivo',system-ui,-apple-system,sans-serif;
  --node-h:36px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--sans);
  background:var(--paper);
  color:var(--ink);
  overflow:hidden;
}
/* blueprint grid */
.grid-bg{
  background-image:
    linear-gradient(var(--grid) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid) 1px,transparent 1px),
    linear-gradient(rgba(111,168,220,.045) 1px,transparent 1px),
    linear-gradient(90deg,rgba(111,168,220,.045) 1px,transparent 1px);
  background-size:120px 120px,120px 120px,24px 24px,24px 24px;
}

.app{display:grid;height:100vh;height:100dvh;grid-template-columns:1fr minmax(340px,430px);grid-template-rows:1fr}
@media (max-width:767px){
  .app{grid-template-columns:1fr;grid-template-rows:55% 45%}
}

/* ---------- MAP PANE ---------- */
.map-pane{position:relative;overflow:auto;outline:none}
.map-inner{position:relative;min-width:100%;min-height:100%}
.map-inner svg{position:absolute;inset:0;pointer-events:none}
.node{
  position:absolute;
  height:var(--node-h);
  display:flex;align-items:center;
  padding:0 14px;
  font-family:var(--mono);font-size:13px;font-weight:500;
  color:var(--ink);
  background:rgba(13,39,64,.85);
  border:1px solid var(--line-dim);
  border-radius:7px;
  cursor:pointer;white-space:nowrap;
  transition:border-color .15s,color .15s,box-shadow .15s,opacity .2s;
  user-select:none;
}
.node:hover{border-color:var(--line);color:#fff}
.node:focus-visible{outline:2px solid var(--trace);outline-offset:2px}
.node.root{
  border:1.5px solid var(--line);
  color:var(--line);
  font-weight:600;font-size:14px;
  cursor:default;letter-spacing:.03em;
  box-shadow:0 0 0 4px rgba(111,168,220,.08);
}
.node.on-path{border-color:var(--trace);color:var(--trace);box-shadow:0 0 14px rgba(255,200,87,.18)}
.node.dimmed{opacity:.34}
.node.leaf{border-style:dashed}
.node.leaf.on-path{border-style:solid}
.node .tag{
  font-size:9px;letter-spacing:.12em;margin-right:8px;
  color:var(--ink-dim);font-family:var(--sans);font-weight:600;
}
.node.on-path .tag{color:var(--trace)}

.map-legend{
  position:sticky;top:0;left:0;z-index:5;
  padding:12px 18px 0;
  pointer-events:none;
  font-family:var(--mono);font-size:10px;letter-spacing:.18em;
  color:var(--ink-dim);text-transform:uppercase;
}
.map-legend b{color:var(--line);font-weight:500}

/* ---------- READOUT PANE ---------- */
.readout{
  background:var(--paper-2);
  border-left:1px dashed var(--line-dim);
  display:flex;flex-direction:column;
  overflow:hidden;
}
@media (max-width:767px){
  .readout{border-left:none;border-top:1px dashed var(--line-dim)}
}
/* title block — like a blueprint drawing corner stamp */
.titleblock{
  border-bottom:1px solid var(--line-dim);
  padding:14px 20px 12px;
  display:flex;justify-content:space-between;align-items:baseline;gap:12px;
  flex-shrink:0;
}
.titleblock h1{
  font-size:13px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--line);
}
.titleblock .rev{font-family:var(--mono);font-size:10px;color:var(--ink-dim);letter-spacing:.1em}
.readout-body{flex:1;overflow-y:auto;padding:20px}

.crumbs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.crumb{
  font-family:var(--mono);font-size:11px;
  border:1px solid var(--line-dim);border-radius:5px;
  padding:3px 9px;color:var(--ink-dim);
}
.crumb.set{border-color:var(--trace);color:var(--trace)}

.cmdcard{
  border:1px solid var(--line-dim);border-radius:9px;
  background:rgba(6,20,34,.7);
  margin-bottom:20px;overflow:hidden;
}
.cmdcard .bar{
  display:flex;align-items:center;gap:8px;
  padding:8px 13px;border-bottom:1px solid var(--line-dim);
  font-family:var(--mono);font-size:10px;letter-spacing:.15em;color:var(--ink-dim);
  text-transform:uppercase;
}
.cmdcard .bar .dot{width:7px;height:7px;border-radius:50%;background:var(--line-dim)}
.cmdcard.ready .bar .dot{background:var(--ok);box-shadow:0 0 8px var(--ok)}
.cmdcard pre{
  padding:15px 16px;
  font-family:var(--mono);font-size:13.5px;line-height:1.65;
  white-space:pre-wrap;word-break:break-word;
  color:var(--ink-dim);
}
.cmdcard.ready pre{color:var(--ok)}
.cmdcard pre .cursor{display:inline-block;width:8px;height:15px;background:var(--line-dim);vertical-align:-2px;animation:blink 1.1s steps(1) infinite}
@keyframes blink{50%{opacity:0}}
@media (prefers-reduced-motion:reduce){.cmdcard pre .cursor{animation:none}}
.copybtn{
  margin-left:auto;background:none;border:1px solid var(--line-dim);border-radius:4px;
  color:var(--ink-dim);font-family:var(--mono);font-size:10px;letter-spacing:.1em;
  padding:2px 8px;cursor:pointer;text-transform:uppercase;
}
.copybtn:hover{border-color:var(--trace);color:var(--trace)}

.readout h2{
  font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
  color:var(--line);margin:0 0 9px;
}
.explain{font-size:14.5px;line-height:1.7;color:var(--ink)}
.explain + h2{margin-top:22px}
.explain em{color:var(--trace);font-style:normal;font-family:var(--mono);font-size:13px}

.caution{
  margin-top:20px;border:1px solid var(--warn);border-radius:8px;
  padding:12px 14px;font-size:13.5px;line-height:1.6;color:var(--warn);
  background:rgba(255,155,113,.06);
}
.caution b{letter-spacing:.15em;font-size:10px;text-transform:uppercase;display:block;margin-bottom:5px}

.hint{
  margin-top:22px;font-size:12.5px;line-height:1.65;color:var(--ink-dim);
  border-top:1px dashed var(--line-dim);padding-top:14px;
}

/* scrollbars */
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(111,168,220,.25);border-radius:6px;border:2px solid var(--paper)}
</style>
</head>
<body>
<div class="app">

  <div class="map-pane grid-bg" id="mapPane" tabindex="0">
    <div class="map-legend">FIELD CHART — <b>pick a verb</b>, then a resource, then a scenario</div>
    <div class="map-inner" id="mapInner">
      <svg id="wires"></svg>
      <div id="nodes"></div>
    </div>
  </div>

  <div class="readout">
    <div class="titleblock">
      <h1>Command Readout</h1>
      <span class="rev">SHEET 01 · REV A</span>
    </div>
    <div class="readout-body" id="readoutBody"></div>
  </div>

</div>

<script>
/* ============================================================
   DATA — verbs → resources → scenarios (with object names)
   ============================================================ */
const NS_LIST = ["default","kube-system","production","staging","monitoring"];

const TREE = [
{ id:"get", label:"get", blurb:"Lists resources — your first look at what exists and what state it's in.",
  resources:[
  { id:"pods", label:"pods", blurb:"Pods are the running units of your workloads.",
    scenarios:[
    { label:"in one namespace", cmd:"kubectl get pods -n production",
      explain:"Lists every pod in the <em>production</em> namespace, one row each, showing its name, how many of its containers are ready, its status (Running, Pending, CrashLoopBackOff…), restart count, and age. This is the everyday health check for a single application environment." },
    { label:"across every namespace", cmd:"kubectl get pods -A",
      explain:"Lists every pod in the entire cluster, regardless of namespace. An extra first column tells you which namespace each pod lives in. Useful when you're hunting for something and don't know where it was deployed." },
    { label:"with node + IP columns", cmd:"kubectl get pods -n production -o wide",
      explain:"Same pod list for <em>production</em>, but with extra columns: the pod's IP address, which worker node it's scheduled on, and its nominated node. Reach for this when you suspect a problem is tied to one specific machine." },
    { label:"only the broken ones", cmd:"kubectl get pods -A --field-selector status.phase!=Running",
      explain:"Filters the cluster-wide pod list down to anything <em>not</em> in the Running phase — Pending, Failed, Unknown. It's a quick 'what's on fire' sweep across all namespaces. (Note: crash-looping pods still count as Running, so pair this with a normal listing.)" },
    { label:"matching a label", cmd:"kubectl get pods -n production -l app=web",
      explain:"Lists only the pods in <em>production</em> whose labels include <em>app=web</em>. Labels are how Kubernetes groups related pods, so this shows exactly the pods behind one application, ignoring everything else in the namespace." },
    { label:"live, as they change", cmd:"kubectl get pods -n staging --watch",
      explain:"Prints the pod list for <em>staging</em>, then keeps the terminal open and prints a new line every time a pod changes state. Perfect for watching a deployment roll out in real time. Press Ctrl-C to stop." },
    ]},
  { id:"deployments", label:"deployments", blurb:"Deployments manage replicated, self-healing sets of pods.",
    scenarios:[
    { label:"in one namespace", cmd:"kubectl get deployments -n production",
      explain:"Lists the deployments in <em>production</em> with four key numbers per row: how many replicas are ready, up-to-date, and available, plus the deployment's age. If READY says 2/3, one replica is missing and worth investigating." },
    { label:"full YAML of one", cmd:"kubectl get deployment api-gateway -n production -o yaml",
      explain:"Dumps the complete live definition of the <em>api-gateway</em> deployment as YAML — image, replica count, environment variables, resource limits, plus the status section Kubernetes maintains. This is the cluster's source of truth, which may differ from the file in your repo." },
    ]},
  { id:"services", label:"services", blurb:"Services give pods a stable network address.",
    scenarios:[
    { label:"in one namespace", cmd:"kubectl get services -n production",
      explain:"Lists the services in <em>production</em>: their type (ClusterIP, NodePort, LoadBalancer), internal cluster IP, any external IP, and the ports they expose. This is how you find out where traffic to an app should be pointed." },
    { label:"with their endpoints", cmd:"kubectl get endpoints api-gateway -n production",
      explain:"Shows the actual pod IPs that the <em>api-gateway</em> service is currently routing traffic to. If this list is empty, the service exists but no healthy pods match its selector — a classic reason an app is 'deployed but unreachable'." },
    ]},
  { id:"namespaces", label:"namespaces", blurb:"Namespaces partition one cluster into isolated environments.",
    scenarios:[
    { label:"list them all", cmd:"kubectl get namespaces",
      explain:"Lists every namespace in the cluster — typically <em>default</em>, <em>kube-system</em> (Kubernetes' own components), <em>kube-public</em>, plus your own like <em>production</em>, <em>staging</em>, and <em>monitoring</em>. Namespaces are the top-level folders everything else lives inside." },
    { label:"with their labels", cmd:"kubectl get namespaces --show-labels",
      explain:"Same namespace list, plus each namespace's labels. Labels on namespaces often drive policy — for example, an <em>environment=prod</em> label may control network rules or admission policies that apply to everything inside." },
    ]},
  { id:"nodes", label:"nodes", blurb:"Nodes are the machines the cluster runs on.",
    scenarios:[
    { label:"list every node", cmd:"kubectl get nodes",
      explain:"Lists each machine in the cluster with its status (Ready or NotReady), role (control-plane or worker), age, and Kubernetes version. A NotReady node means its workloads are being — or about to be — rescheduled elsewhere." },
    { label:"with OS + IP detail", cmd:"kubectl get nodes -o wide",
      explain:"The node list with extra columns: internal and external IPs, operating system image, kernel version, and container runtime. Handy during upgrades to spot version drift between machines." },
    ]},
  { id:"events", label:"events", blurb:"Events are the cluster's activity log.",
    scenarios:[
    { label:"recent, newest last", cmd:"kubectl get events -n production --sort-by=.metadata.creationTimestamp",
      explain:"Prints the recent event stream for <em>production</em> in chronological order — scheduling decisions, image pulls, probe failures, restarts. When a pod is misbehaving and you don't know why, this log usually names the culprit." },
    { label:"warnings only", cmd:"kubectl get events -A --field-selector type=Warning",
      explain:"Filters the cluster-wide event stream to warnings only: failed scheduling, failed mounts, unhealthy probes, image pull errors. It cuts the noise of routine 'everything is fine' events and surfaces just the problems." },
    ]},
]},

{ id:"describe", label:"describe", blurb:"Deep-dives one object: its full configuration, current state, and recent events.",
  resources:[
  { id:"d-pod", label:"pod", blurb:"",
    scenarios:[
    { label:"a stuck web pod", cmd:"kubectl describe pod nginx-web-7d4b9c8f-xk2p1 -n production",
      explain:"Prints everything Kubernetes knows about the pod <em>nginx-web-7d4b9c8f-xk2p1</em>: its containers and images, restart counts, resource requests, volume mounts, and — most importantly — the Events section at the bottom, which narrates why it's Pending, crash-looping, or failing probes. This is the single most useful debugging command in kubectl." },
    { label:"a database pod", cmd:"kubectl describe pod postgres-0 -n production",
      explain:"Full detail on <em>postgres-0</em>, the first pod of a StatefulSet. Beyond the usual container info, check the Volumes section to confirm its persistent volume claim is bound — stateful pods most often get stuck waiting on storage." },
    ]},
  { id:"d-deploy", label:"deployment", blurb:"",
    scenarios:[
    { label:"the api-gateway app", cmd:"kubectl describe deployment api-gateway -n production",
      explain:"Shows the <em>api-gateway</em> deployment's strategy, replica counts, pod template (image, ports, env), and its rollout conditions. If a rollout is stuck, the Conditions and Events here explain whether it's a bad image, failed probes, or insufficient cluster capacity." },
    ]},
  { id:"d-node", label:"node", blurb:"",
    scenarios:[
    { label:"one worker machine", cmd:"kubectl describe node worker-node-03",
      explain:"A full report card for the machine <em>worker-node-03</em>: its capacity and how much CPU/memory is already requested, its conditions (disk pressure, memory pressure, readiness), taints that repel pods, and the list of every pod currently running on it. Use it to answer 'why won't anything schedule here?'" },
    ]},
  { id:"d-svc", label:"service", blurb:"",
    scenarios:[
    { label:"the api-gateway service", cmd:"kubectl describe service api-gateway -n production",
      explain:"Shows the <em>api-gateway</em> service's selector, ports, and the endpoint IPs it's currently routing to. Compare the selector against your pods' labels — a one-character mismatch here is the classic cause of a service that routes to nothing." },
    ]},
]},

{ id:"logs", label:"logs", blurb:"Streams what a container is printing — the application's own story.",
  resources:[
  { id:"l-pod", label:"pod", blurb:"",
    scenarios:[
    { label:"follow live output", cmd:"kubectl logs -f nginx-web-7d4b9c8f-xk2p1 -n production",
      explain:"Attaches to the pod <em>nginx-web-7d4b9c8f-xk2p1</em> and streams its log output live to your terminal, like tail -f. You'll see requests, errors, and stack traces as they happen. Ctrl-C detaches without affecting the pod." },
    { label:"why it crashed last time", cmd:"kubectl logs nginx-web-7d4b9c8f-xk2p1 -n production --previous",
      explain:"Shows the logs from the <em>previous</em> run of the container — the one that crashed and was restarted. For a pod in CrashLoopBackOff, the current container may be too young to have logged anything; the dying words are in the previous instance." },
    { label:"just the last 100 lines", cmd:"kubectl logs postgres-0 -n production --tail=100 --since=1h",
      explain:"Prints only the last 100 log lines from <em>postgres-0</em>, and only from the past hour. This keeps chatty applications from flooding your terminal when you just need the recent context." },
    { label:"one container in a multi-container pod", cmd:"kubectl logs api-gateway-5f6b7-p9qzt -c istio-proxy -n production",
      explain:"When a pod runs several containers (app plus sidecars), <em>-c</em> picks which one to read. Here it reads the <em>istio-proxy</em> sidecar's logs instead of the main application — the place to look when the app seems fine but traffic isn't arriving." },
    { label:"all pods behind one app", cmd:"kubectl logs -n production -l app=web --prefix",
      explain:"Streams logs from <em>every</em> pod labeled <em>app=web</em> at once, prefixing each line with the pod it came from. With multiple replicas you rarely know which one served the failing request — this merges them into one view." },
    ]},
]},

{ id:"exec", label:"exec", blurb:"Runs a command inside a live container — a remote shell into your workload.",
  resources:[
  { id:"e-pod", label:"pod", blurb:"",
    scenarios:[
    { label:"open an interactive shell", cmd:"kubectl exec -it nginx-web-7d4b9c8f-xk2p1 -n production -- /bin/sh",
      explain:"Opens a live shell <em>inside</em> the running container, as if you'd SSH'd into it. From there you can inspect files, check config, and test connectivity from the pod's own point of view. Type <em>exit</em> to leave. (Minimal images may only have /bin/sh, not bash.)" },
    { label:"check env vars", cmd:"kubectl exec nginx-web-7d4b9c8f-xk2p1 -n production -- env",
      explain:"Runs a single command — <em>env</em> — inside the container and prints the result, without opening a shell. This reveals exactly which environment variables the app actually received, the fastest way to confirm a ConfigMap or Secret was wired in correctly." },
    { label:"test connectivity from inside", cmd:"kubectl exec -it api-gateway-5f6b7-p9qzt -n production -- wget -qO- http://postgres:5432",
      explain:"Runs a network probe from <em>inside</em> the pod, testing whether it can reach the <em>postgres</em> service. Network policies and DNS behave differently inside the cluster than from your laptop, so 'can the pod itself reach it?' is the question that matters." },
    ]},
]},

{ id:"apply", label:"apply", blurb:"Makes the cluster match your YAML files — the declarative way to create and update.",
  resources:[
  { id:"a-file", label:"manifest file", blurb:"",
    scenarios:[
    { label:"apply one file", cmd:"kubectl apply -f deployment.yaml -n staging",
      explain:"Reads <em>deployment.yaml</em> and makes the <em>staging</em> namespace match it: creating the resource if it doesn't exist, or updating it in place if it does. Apply is idempotent — running it twice is safe and does nothing the second time." },
    { label:"apply a whole folder", cmd:"kubectl apply -f ./manifests/ -R",
      explain:"Applies every YAML file in the <em>manifests</em> folder and its subfolders in one shot — deployments, services, configmaps, the lot. This is how a whole application stack gets deployed or updated together." },
    { label:"preview without changing anything", cmd:"kubectl apply -f deployment.yaml -n production --dry-run=server",
      explain:"Sends the file to the API server for full validation but <em>does not save it</em>. The server tells you whether it would be created or configured, and rejects invalid specs. It's the look-before-you-leap step before touching production." },
    { label:"see the diff first", cmd:"kubectl diff -f deployment.yaml -n production",
      explain:"Compares your local file against what's live in the cluster and prints a line-by-line diff of what apply <em>would</em> change. Reviewing this before applying to <em>production</em> catches surprises like someone having hot-fixed the live object." },
    ]},
]},

{ id:"delete", label:"delete", blurb:"Removes resources. Kubernetes may recreate managed pods; everything else is gone.",
  resources:[
  { id:"del-pod", label:"pod", blurb:"",
    scenarios:[
    { label:"restart by deletion", cmd:"kubectl delete pod nginx-web-7d4b9c8f-xk2p1 -n production",
      explain:"Gracefully terminates this one pod. Because it's managed by a deployment, Kubernetes immediately creates a fresh replacement — so in practice this is the standard way to give a single misbehaving pod a clean restart.",
      caution:"Only self-heals if a controller (Deployment, StatefulSet, DaemonSet) owns the pod. A bare pod is simply gone." },
    { label:"force-kill a stuck pod", cmd:"kubectl delete pod postgres-0 -n production --grace-period=0 --force",
      explain:"Skips the graceful shutdown and tells the API server to remove the pod record immediately. Used when a pod is wedged in Terminating, usually because its node died.",
      caution:"For stateful workloads this risks two instances writing to the same volume if the old one is secretly still running. Confirm the node is truly dead first." },
    ]},
  { id:"del-deploy", label:"deployment", blurb:"",
    scenarios:[
    { label:"remove an app entirely", cmd:"kubectl delete deployment api-gateway -n staging",
      explain:"Deletes the <em>api-gateway</em> deployment from <em>staging</em>, which cascades: its replica sets and all their pods are terminated too. The service and configmaps around it are separate objects and survive.",
      caution:"There is no undo. If the YAML isn't in version control, the configuration is lost with it." },
    ]},
]},

{ id:"scale", label:"scale", blurb:"Changes how many replicas of a workload run.",
  resources:[
  { id:"s-deploy", label:"deployment", blurb:"",
    scenarios:[
    { label:"scale up for load", cmd:"kubectl scale deployment api-gateway -n production --replicas=10",
      explain:"Tells Kubernetes to run 10 copies of <em>api-gateway</em> instead of the current count. New pods are created within seconds (capacity permitting) and the service automatically spreads traffic across all of them." },
    { label:"scale to zero (pause an app)", cmd:"kubectl scale deployment batch-worker -n staging --replicas=0",
      explain:"Terminates every pod of <em>batch-worker</em> while keeping the deployment object intact — the app is paused, not deleted. Scaling back up later restores it with the same configuration. A common way to silence a misbehaving non-critical workload.",
      caution:"If a HorizontalPodAutoscaler manages this deployment, it may scale it right back up." },
    ]},
]},

{ id:"rollout", label:"rollout", blurb:"Manages deployment updates: restart, watch, and roll back.",
  resources:[
  { id:"r-deploy", label:"deployment", blurb:"",
    scenarios:[
    { label:"rolling restart", cmd:"kubectl rollout restart deployment api-gateway -n production",
      explain:"Replaces every pod of <em>api-gateway</em> one batch at a time, keeping the app available throughout. The go-to move after changing a ConfigMap or Secret, since pods only read those at startup." },
    { label:"watch a rollout finish", cmd:"kubectl rollout status deployment api-gateway -n production",
      explain:"Blocks and reports progress until the current rollout of <em>api-gateway</em> completes — 'x of y updated replicas are available' — then exits successfully. CI/CD pipelines use its exit code to know whether a deploy actually landed." },
    { label:"undo a bad deploy", cmd:"kubectl rollout undo deployment api-gateway -n production",
      explain:"Rolls <em>api-gateway</em> back to its previous revision — the fastest recovery when a new version starts erroring. The rollback is itself a rolling update, so the app stays available while it happens." },
    { label:"see revision history", cmd:"kubectl rollout history deployment api-gateway -n production",
      explain:"Lists the recorded revisions of <em>api-gateway</em> with their change causes. Pair with <em>undo --to-revision=N</em> when you need to jump back more than one version." },
    ]},
]},

{ id:"top", label:"top", blurb:"Live CPU and memory usage, from the metrics server.",
  resources:[
  { id:"t-pods", label:"pods", blurb:"",
    scenarios:[
    { label:"hungriest pods first", cmd:"kubectl top pods -n production --sort-by=memory",
      explain:"Shows current CPU and memory consumption for each pod in <em>production</em>, sorted with the biggest memory users at the top. The quickest way to spot a leak or find out who's eating the node." },
    ]},
  { id:"t-nodes", label:"nodes", blurb:"",
    scenarios:[
    { label:"cluster capacity at a glance", cmd:"kubectl top nodes",
      explain:"Shows each node's live CPU and memory usage, both in absolute terms and as a percentage of capacity. Nodes running hot (85%+) explain evictions and Pending pods, and tell you it's time to add capacity." },
    ]},
]},

{ id:"port-forward", label:"port-forward", blurb:"Tunnels a local port to a pod or service inside the cluster.",
  resources:[
  { id:"pf-svc", label:"service", blurb:"",
    scenarios:[
    { label:"open an internal dashboard", cmd:"kubectl port-forward svc/grafana -n monitoring 3000:3000",
      explain:"Creates a private tunnel from <em>localhost:3000</em> on your machine to the <em>grafana</em> service inside the <em>monitoring</em> namespace. Open http://localhost:3000 in a browser and you're using the internal dashboard without exposing it to the world. The tunnel lives as long as the command runs." },
    ]},
  { id:"pf-pod", label:"pod", blurb:"",
    scenarios:[
    { label:"poke a database locally", cmd:"kubectl port-forward pod/postgres-0 -n production 5432:5432",
      explain:"Tunnels your <em>localhost:5432</em> straight to the <em>postgres-0</em> pod, so a local psql client can connect as if the database were on your machine. Great for debugging; the connection is only as private as your laptop.",
      caution:"You are talking to the production database. Prefer a read-only account." },
    ]},
]},

{ id:"drain", label:"cordon / drain", blurb:"Safely empties a node for maintenance.",
  resources:[
  { id:"dr-node", label:"node", blurb:"",
    scenarios:[
    { label:"stop new pods landing", cmd:"kubectl cordon worker-node-03",
      explain:"Marks <em>worker-node-03</em> as unschedulable: everything already on it keeps running, but no <em>new</em> pods will be placed there. The gentle first step before maintenance, or when a node is acting suspicious." },
    { label:"evacuate for maintenance", cmd:"kubectl drain worker-node-03 --ignore-daemonsets --delete-emptydir-data",
      explain:"Cordons <em>worker-node-03</em> and then evicts every pod on it, letting their controllers recreate them on other nodes. Once it finishes, the machine is empty and safe to reboot, patch, or replace.",
      caution:"Pods using emptyDir volumes lose that data, and single-replica apps will blip. Check what's running there first with describe node." },
    { label:"return node to service", cmd:"kubectl uncordon worker-node-03",
      explain:"Removes the unschedulable mark from <em>worker-node-03</em> after maintenance, so the scheduler can place pods on it again. Existing workloads won't move back automatically — new and rescheduled pods will simply start using it." },

/* ============================================================
   STATE + LAYOUT
   ============================================================ */
const state = { verb:null, res:null, scen:null };
const mapPane   = document.getElementById('mapPane');
const mapInner  = document.getElementById('mapInner');
const nodesEl   = document.getElementById('nodes');
const wiresEl   = document.getElementById('wires');
const readout   = document.getElementById('readoutBody');

const PADX = 26, GAP_X = 64, NODE_H = 36, GAP_Y = 12, PAD_TOP = 46, PAD_BOT = 24;

function measure(text, cls){
  const probe = document.createElement('div');
  probe.className = 'node ' + (cls||'');
  probe.style.visibility='hidden'; probe.style.position='absolute';
  probe.innerHTML = text;
  nodesEl.appendChild(probe);
  const w = probe.offsetWidth;
  probe.remove();
  return w;
}

function layout(){
  nodesEl.innerHTML=''; 
  const paneH = mapPane.clientHeight;

  // visible columns
  const cols = [];
  cols.push([{kind:'root', label:'kubectl', id:'__root'}]);
  cols.push(TREE.map(v=>({kind:'verb', label:v.label, id:v.id, data:v})));
  if(state.verb) cols.push(state.verb.resources.map(r=>({kind:'res', label:r.label, id:r.id, data:r})));
  if(state.res)  cols.push(state.res.scenarios.map((s,i)=>({kind:'scen', label:s.label, id:state.res.id+'-s'+i, data:s})));

  // measure widths per column
  const colW = cols.map(col => Math.max(...col.map(n => measure(nodeHTML(n)))) );
  const colX = []; let x = PADX;
  for(let i=0;i<cols.length;i++){ colX.push(x); x += colW[i] + GAP_X; }
  const totalW = x - GAP_X + PADX;

  // vertical placement
  const maxCount = Math.max(...cols.map(c=>c.length));
  const contentH = Math.max(paneH, PAD_TOP + PAD_BOT + maxCount*(NODE_H+GAP_Y));
  const positions = {}; // id -> {x,y,w}

  cols.forEach((col,ci)=>{
    const blockH = col.length*NODE_H + (col.length-1)*GAP_Y;
    let anchor = contentH/2;
    if(ci===2 && state.verb) anchor = positions[state.verb.id].y + NODE_H/2;
    if(ci===3 && state.res)  anchor = positions[state.res.id].y + NODE_H/2;
    let top = anchor - blockH/2;
    top = Math.max(PAD_TOP, Math.min(top, contentH - PAD_BOT - blockH));
    col.forEach((n,i)=>{
      positions[n.id] = { x: colX[ci], y: top + i*(NODE_H+GAP_Y), w: colW[ci], col:ci };
    });
  });

  mapInner.style.width  = totalW + 'px';
  mapInner.style.height = contentH + 'px';

  // wires
  wiresEl.setAttribute('width', totalW);
  wiresEl.setAttribute('height', contentH);
  wiresEl.innerHTML='';
  function wire(fromId, toId, hot){
    const a = positions[fromId], b = positions[toId];
    if(!a||!b) return;
    // width of the actual from-node may be narrower than col width; use measured node width
    const x1 = a.x + a.nodeW, y1 = a.y + NODE_H/2;
    const x2 = b.x, y2 = b.y + NODE_H/2;
    const mx = (x1+x2)/2;
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d', `M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}`);
    p.setAttribute('fill','none');
    p.setAttribute('stroke', hot ? 'var(--trace)' : 'var(--line-dim)');
    p.setAttribute('stroke-width', hot ? 1.8 : 1);
    if(!hot) p.setAttribute('stroke-dasharray','4 4');
    wiresEl.appendChild(p);
  }

  // render nodes
  cols.flat().forEach(n=>{
    const el = document.createElement('div');
    el.className = 'node' + (n.kind==='root'?' root':'') + (n.kind==='scen'?' leaf':'');
    el.innerHTML = nodeHTML(n);
    const pos = positions[n.id];
    el.style.left = pos.x+'px';
    el.style.top  = pos.y+'px';
    nodesEl.appendChild(el);
    pos.nodeW = el.offsetWidth;

    const onPath =
      (n.kind==='root') ||
      (n.kind==='verb' && state.verb && n.id===state.verb.id) ||
      (n.kind==='res'  && state.res  && n.id===state.res.id)  ||
      (n.kind==='scen' && state.scen && n.data===state.scen);
    if(onPath && n.kind!=='root') el.classList.add('on-path');
    if(n.kind==='root' && state.verb) el.classList.add('on-path');

    const colHasPick =
      (n.kind==='verb' && state.verb) ||
      (n.kind==='res'  && state.res)  ||
      (n.kind==='scen' && state.scen);
    if(colHasPick && !onPath) el.classList.add('dimmed');

    if(n.kind!=='root'){
      el.tabIndex = 0;
      const pick = ()=>select(n);
      el.addEventListener('click', pick);
      el.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){e.preventDefault();pick();} });
    }
  });

  // draw wires after nodeW known
  cols[1].forEach(v=> wire('__root', v.id, state.verb && v.id===state.verb.id));
  if(state.verb && cols[2]) cols[2].forEach(r=> wire(state.verb.id, r.id, state.res && r.id===state.res.id));
  if(state.res && cols[3])  cols[3].forEach(s=> wire(state.res.id, s.id, state.scen===s.data));
}

function nodeHTML(n){
  const tags = {verb:'V', res:'R', scen:'S'};
  const t = tags[n.kind] ? `<span class="tag">${tags[n.kind]}</span>` : '';
  return t + n.label;
}

function select(n){
  if(n.kind==='verb'){
    state.verb = (state.verb && state.verb.id===n.id) ? null : n.data;
    state.res = null; state.scen = null;
  } else if(n.kind==='res'){
    state.res = (state.res && state.res.id===n.id) ? null : n.data;
    state.scen = null;
  } else if(n.kind==='scen'){
    state.scen = (state.scen===n.data) ? null : n.data;
  }
  layout();
  renderReadout();
  // reveal newest column
  requestAnimationFrame(()=> mapPane.scrollTo({left: mapInner.scrollWidth, behavior:'smooth'}));
}

/* ============================================================
   READOUT PANE
   ============================================================ */
function renderReadout(){
  const crumbs = `
    <div class="crumbs">
      <span class="crumb set">kubectl</span>
      <span class="crumb ${state.verb?'set':''}">${state.verb?state.verb.label:'verb'}</span>
      <span class="crumb ${state.res?'set':''}">${state.res?state.res.label:'resource'}</span>
      <span class="crumb ${state.scen?'set':''}">${state.scen?'scenario':'scenario'}</span>
    </div>`;

  let cmdHTML, ready=false;
  if(state.scen){
    ready = true;
    cmdHTML = escapeHTML(state.scen.cmd);
  } else {
    let partial = 'kubectl';
    if(state.verb) partial += ' ' + state.verb.label.split(' / ')[0];
    if(state.res && !['manifest file'].includes(state.res.label)) partial += ' ' + state.res.label;
    cmdHTML = escapeHTML(partial) + ' <span class="cursor"></span>';
  }

  let body = '';
  if(state.scen){
    body = `<h2>What this does</h2><div class="explain">${state.scen.explain}</div>`;
    if(state.scen.caution){
      body += `<div class="caution"><b>Handle with care</b>${state.scen.caution}</div>`;
    }
    body += `<div class="hint">Pick another scenario on the chart to compare, or click the verb again to fold the branch.</div>`;
  } else if(state.res){
    const intro = state.res.blurb ? state.res.blurb+' ' : '';
    body = `<h2>Almost there</h2><div class="explain">${intro}Choose a <em>scenario</em> on the chart — each one is a complete, real-world command with example namespaces and object names filled in.</div>`;
  } else if(state.verb){
    body = `<h2>About “${state.verb.label}”</h2><div class="explain">${state.verb.blurb}</div>
            <div class="hint">Now pick a <b>resource</b> — the kind of object the verb acts on.</div>`;
  } else {
    body = `<h2>How to read this chart</h2>
      <div class="explain">The map fans out left to right: <em>verb</em> → <em>resource</em> → <em>scenario</em>. Pick a path and this pane translates the finished command into plain language — what it shows, when you'd reach for it, and what to watch out for.</div>
      <h2>Namespaces in this cluster</h2>
      <div class="explain">${NS_LIST.map(n=>`<em>${n}</em>`).join(' · ')} — scenarios use these throughout, along with realistic object names like <em>api-gateway</em>, <em>nginx-web-7d4b9c8f-xk2p1</em>, <em>postgres-0</em>, and <em>worker-node-03</em>.</div>
      <div class="hint">Start with <b>get → pods</b> if you're new — it's the command you'll run a hundred times a day.</div>`;
  }

  readout.innerHTML = crumbs + `
    <div class="cmdcard ${ready?'ready':''}">
      <div class="bar"><span class="dot"></span>${ready?'command assembled':'building command'}
        ${ready?'<button class="copybtn" id="copyBtn">copy</button>':''}
      </div>
      <pre>${cmdHTML}</pre>
    </div>` + body;

  const btn = document.getElementById('copyBtn');
  if(btn){
    btn.addEventListener('click', ()=>{
      const ta = document.createElement('textarea');
      ta.value = state.scen.cmd; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); ta.remove();
      btn.textContent = 'copied'; setTimeout(()=>btn.textContent='copy', 1400);
    });
  }
}

function escapeHTML(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

window.addEventListener('resize', ()=>layout());
layout();
renderReadout();
</script>
</body>
